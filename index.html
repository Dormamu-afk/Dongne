const Btn = ({ children, onClick, disabled, full, size='md', variant='primary', color=T.accent, colorHov=T.accentHov }) => {
  const [hov, setHov] = React.useState(false);
  const h = {lg:52,md:44,sm:36}[size];
  const fs = {lg:16,md:15,sm:13}[size];
  const px = {lg:28,md:22,sm:16}[size];
  const isGhost = variant==='ghost';
  return (
    <button onClick={onClick} disabled={disabled}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{ height:h, padding:`0 ${px}px`, background:isGhost?(hov?T.surface:'transparent'):disabled?'#E8E0D5':hov?colorHov:color, color:isGhost?T.primary:disabled?T.disabled:'#fff', border:isGhost?`1.5px solid ${T.border}`:'none', borderRadius:8, fontSize:fs, fontWeight:600, cursor:disabled?'not-allowed':'pointer', fontFamily:'Plus Jakarta Sans,sans-serif', width:full?'100%':'auto', transition:'all 0.15s', flexShrink:0 }}>
      {children}
    </button>
  );
};

const NeighborhoodMap = ({ onSelect }) => {
  const [hoveredId, setHoveredId] = React.useState(null);
  const [tooltip, setTooltip] = React.useState({ x:0, y:0 });
  const svgRef = React.useRef(null);
  const wrapRef = React.useRef(null);

  const hovered = NEIGHBORHOODS_DATA.find(n=>n.id===hoveredId);

  const handlePinEnter = (n, e) => {
    setHoveredId(n.id);
    if (!svgRef.current || !wrapRef.current) return;
    const svgRect = svgRef.current.getBoundingClientRect();
    const wrapRect = wrapRef.current.getBoundingClientRect();
    const sx = svgRect.width / 600;
    const sy = svgRect.height / 440;
    setTooltip({ x: n.mapX*sx + (svgRect.left-wrapRect.left), y: n.mapY*sy + (svgRect.top-wrapRect.top) });
  };

  return (
    <section style={{ background:T.surface, padding:'72px 32px 80px' }}>
      <div style={{ maxWidth:1100, margin:'0 auto' }}>

            </p>
          </div>
          <button onClick={onBack} style={{ fontSize:13, color:T.muted, background:'none', border:'none', cursor:'pointer', display:'flex', alignItems:'center', gap:5, fontFamily:'Plus Jakarta Sans,sans-serif' }}>
            <svg width="14" height="14" viewBox="0 0 20 20" fill="none"><path d="M12.5 15L7.5 10L12.5 5" stroke={T.muted} strokeWidth="1.5" strokeLinecap="round"/></svg>
            Back
          </button>
        </div>

        <div style={{ display:'grid', gridTemplateColumns:'60% 40%', gap:24, alignItems:'start' }}>
          {/* Left: Listing Grid */}
          <div>
            {sorted.length === 0 ? (
              <div style={{ textAlign:'center', padding:'60px 24px' }}>
                <div style={{ fontSize:32, marginBottom:12 }}>🏠</div>
                <h3 style={{ fontSize:18, fontWeight:700, color:T.primary, marginBottom:8 }}>No stays found</h3>
                <p style={{ fontSize:14, color:T.muted }}>Try adjusting your filters.</p>
              </div>
            ) : (
              <div style={{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:18 }}>
                {sorted.map(s => (
                  <StayCard key={s.id} stay={s} onClick={()=>s.available&&onStayClick(s)}/>
                ))}
              </div>
            )}
          </div>
          {/* Right: Map */}
          <MapPanel neighborhoodId={filters.neighborhood}/>
        </div>
      </div>
    </div>
  );
};

            <p style={{ fontSize:11, color:T.muted, textAlign:'center', marginTop:8, lineHeight:1.5 }}>
              You won't be charged yet · Concierge confirms within 24h
            </p>

            <div style={{ borderTop:`1px solid ${T.border}`, marginTop:16, paddingTop:16 }}>
              {[['💳','No security deposit games'],['✅','Licensed long-term rentals only'],['📞','24/7 English concierge']].map(([icon,text])=>(
                <div key={text} style={{ display:'flex', alignItems:'center', gap:8, marginBottom:8, fontSize:12, color:T.muted }}>
                  <span>{icon}</span>{text}
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

// ─── QUICK MATCH WIZARD ───────────────────────────────────────────────────────
const QuickMatch = ({ onDone, onBack }) => {
  const [qStep, setQStep] = React.useState(0);
  const [answers, setAnswers] = React.useState({});
  const [dateVal, setDateVal] = React.useState('');
  const [submitted, setSubmitted] = React.useState(false);
  const [booking, setBooking] = React.useState({ slot:null, name:'', email:'' });

  const QUESTIONS = [
    { key:'arrival',  title:"When are you arriving in Korea?", type:'date' },
    { key:'duration', title:"How long are you planning to stay?", type:'choice', options:[
      { value:'1mo', label:'~1 month',   sub:'30–45 days' },
      { value:'2mo', label:'~2 months',  sub:'45–90 days' },
      { value:'3mo', label:'3 months+',  sub:'90+ days' },
      { value:'1yr', label:'1 year+',    sub:'F-1-D visa required' },
    ]},
    { key:'visa', title:"What's your visa status?", type:'choice', options:[
      { value:'b2',    label:'B-2 Tourist',      sub:'Up to 90 days, visa-free' },
      { value:'f1d',   label:'F-1-D Workcation', sub:'Up to 1 year, $66k+ income req.' },
      { value:'d4',    label:'D-4 Student',       sub:'Language school enrollment' },
      { value:'unsure',label:'Not sure yet',       sub:'Concierge will guide you' },
    ]},
    { key:'budget', title:"What's your monthly budget?", type:'choice', options:[
      { value:'low',     label:'Under $800',   sub:'~₩1,000,000' },
      { value:'mid',     label:'$800–1,200',   sub:'~₩1,000–1,500,000' },
      { value:'high',    label:'$1,200–2,000', sub:'~₩1,500–2,500,000' },
      { value:'premium', label:'$2,000+',      sub:'₩2,500,000+' },
    ]},
    { key:'vibe', title:"What kind of neighborhood vibe do you want?", type:'choice', options:[
      { value:'creative', label:'Creative & Trendy', sub:'Yeonnam · Seongsu',   icon:'🎨' },
      { value:'expat',    label:'Expat Hub',          sub:'Haebangchon · Itaewon', icon:'🌍' },
      { value:'business', label:'Business Central',   sub:'Gangnam · Yeoksam',  icon:'💼' },
      { value:'quiet',    label:'Quiet & Local',      sub:'Mangwon · Hapjeong', icon:'🌿' },
    ]},
  ];

  const SLOTS = [
    { id:1, day:'Today',    time:'3:00 PM',  avail:true },
    { id:2, day:'Today',    time:'5:00 PM',  avail:true },
    { id:3, day:'Tomorrow', time:'10:00 AM', avail:true },
    { id:4, day:'Tomorrow', time:'2:00 PM',  avail:false },
    { id:5, day:'Tomorrow', time:'4:00 PM',  avail:true },
    { id:6, day:'Day after', time:'11:00 AM', avail:true },
    { id:7, day:'Day after', time:'1:00 PM',  avail:true },
    { id:8, day:'Day after', time:'3:00 PM',  avail:false },
  ];

  const q = QUESTIONS[qStep];
  const pickChoice = v => {
    const newAns = { ...answers, [q.key]: v };
    setAnswers(newAns);
    if (qStep < QUESTIONS.length-1) setTimeout(()=>setQStep(qStep+1), 220);
    else setQStep(QUESTIONS.length);
  };

  if (submitted) return (
    <div className="animate-in" style={{ maxWidth:520, margin:'80px auto', padding:'0 24px', textAlign:'center' }}>
      <div style={{ width:72, height:72, borderRadius:'50%', background:T.successBg, display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 20px', fontSize:30 }}>✓</div>
      <Badge color={T.success} bg={T.successBg}>Confirmed!</Badge>
      <h2 style={{ fontFamily:'Fraunces,serif', fontSize:26, fontWeight:700, color:T.primary, margin:'14px 0 10px' }}>Concierge call booked!</h2>
      <p style={{ fontSize:14, color:T.muted, lineHeight:1.7, marginBottom:28 }}>A 15-min video call to find your perfect listings.<br/>Check your email for the Google Meet link.</p>
      <Btn onClick={onBack} full>Back to home</Btn>
    </div>
  );

  // Concierge booking step
  if (qStep === QUESTIONS.length) return (
    <div className="animate-in" style={{ maxWidth:680, margin:'0 auto', padding:'40px 24px 60px' }}>
      <button onClick={()=>setQStep(QUESTIONS.length-1)} style={{ display:'flex', alignItems:'center', gap:6, background:'none', border:'none', color:T.muted, fontSize:13, cursor:'pointer', marginBottom:28, fontFamily:'Plus Jakarta Sans,sans-serif' }}>
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M12.5 15L7.5 10L12.5 5" stroke={T.muted} strokeWidth="1.5" strokeLinecap="round"/></svg>
        Back
      </button>
      <Badge color={T.accent} bg={T.accentSubtle}>Last step</Badge>
      <h2 style={{ fontFamily:'Fraunces,serif', fontSize:26, fontWeight:700, color:T.primary, margin:'12px 0 6px' }}>Book a free concierge call</h2>
      <p style={{ fontSize:14, color:T.muted, marginBottom:28, lineHeight:1.65 }}>15-min video call — we'll curate 3 listings perfectly matched to your answers.</p>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 280px', gap:32, alignItems:'start' }}>
        <div>
          <div style={{ fontSize:13, fontWeight:600, color:T.primary, marginBottom:12 }}>Select a time</div>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:8, marginBottom:24 }}>
            {SLOTS.map(s=>(
              <button key={s.id} onClick={()=>s.avail&&setBooking({...booking,slot:s.id})} disabled={!s.avail}
                style={{ padding:'10px 8px', borderRadius:8, border:`2px solid ${booking.slot===s.id?T.accent:T.border}`, background:!s.avail?T.surface:booking.slot===s.id?T.accentSubtle:T.white, cursor:s.avail?'pointer':'not-allowed', fontFamily:'Plus Jakarta Sans,sans-serif', opacity:s.avail?1:0.4, transition:'all 0.15s' }}>
                <div style={{ fontSize:10, color:T.muted, marginBottom:2, fontWeight:500 }}>{s.day}</div>
                <div style={{ fontSize:13, fontWeight:700, color:booking.slot===s.id?T.accent:T.primary }}>{s.time}</div>
              </button>
            ))}
          </div>
          <FormInput label="Your name" placeholder="Jane Morrison" value={booking.name} onChange={e=>setBooking({...booking,name:e.target.value})}/>
          <FormInput label="Email address" type="email" placeholder="jane@example.com" value={booking.email} onChange={e=>setBooking({...booking,email:e.target.value})} hint="We'll send a confirmation + Google Meet link"/>
          <Btn onClick={()=>booking.slot&&booking.name&&booking.email&&setSubmitted(true)}
            disabled={!booking.slot||!booking.name||!booking.email} full size="lg">
            {booking.slot&&booking.name&&booking.email?'Confirm Concierge Call →':'Fill in all fields to continue'}
          </Btn>
        </div>
        <div style={{ background:T.white, border:`1px solid ${T.border}`, borderRadius:12, padding:'20px' }}>
          <div style={{ fontSize:14, fontWeight:700, color:T.primary, marginBottom:14 }}>What we cover in the call</div>
          {[
            { icon:'🏠', title:'Listing curation', desc:'3 hand-picked listings based on your answers' },
            { icon:'📋', title:'Visa guidance', desc:'Document checklist tailored to your visa type' },
            { icon:'📱', title:'eSIM + bank setup', desc:'Everything you need to know for Day 1' },
            { icon:'💬', title:'24/7 KakaoTalk', desc:'Unlimited follow-up questions via chat' },
          ].map(item=>(
            <div key={item.title} style={{ display:'flex', gap:10, marginBottom:14 }}>
              <span style={{ fontSize:18, flexShrink:0, lineHeight:1.3 }}>{item.icon}</span>
              <div>
                <div style={{ fontSize:13, fontWeight:600, color:T.primary, marginBottom:2 }}>{item.title}</div>
                <div style={{ fontSize:12, color:T.muted, lineHeight:1.5 }}>{item.desc}</div>
              </div>
            </div>
          ))}
          <div style={{ background:T.accentSubtle, borderRadius:8, padding:'12px 14px', border:`1px solid ${T.accentLight}` }}>
            <div style={{ fontSize:12, fontWeight:700, color:T.accent, marginBottom:2 }}>Completely free</div>
            <div style={{ fontSize:11, color:T.muted }}>First call is free. Payment only after booking.</div>
          </div>
        </div>
      </div>
    </div>
  );

  return (
    <div style={{ maxWidth:600, margin:'0 auto', padding:'40px 24px 60px' }}>
      <button onClick={()=>qStep===0?onBack():setQStep(qStep-1)} style={{ display:'flex', alignItems:'center', gap:6, background:'none', border:'none', color:T.muted, fontSize:13, cursor:'pointer', marginBottom:28, fontFamily:'Plus Jakarta Sans,sans-serif' }}>
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M12.5 15L7.5 10L12.5 5" stroke={T.muted} strokeWidth="1.5" strokeLinecap="round"/></svg>
        {qStep===0?'Back':'Previous'}
      </button>
      <ProgressBar step={qStep+1} total={QUESTIONS.length}/>
      <div className="animate-in" key={qStep} style={{ marginBottom:28 }}>
        <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:14 }}>
          <div style={{ width:32, height:32, borderRadius:'50%', background:T.accentSubtle, display:'flex', alignItems:'center', justifyContent:'center' }}>
            <span style={{ fontSize:13, fontWeight:700, color:T.accent }}>{qStep+1}</span>
          </div>
          <span style={{ fontSize:11, fontWeight:600, color:T.muted, letterSpacing:'0.06em', textTransform:'uppercase' }}>Quick Match · {qStep+1}/{QUESTIONS.length}</span>
        </div>
        <h2 style={{ fontFamily:'Fraunces,serif', fontSize:26, fontWeight:700, color:T.primary, lineHeight:1.3 }}>{q.title}</h2>
      </div>
      {q.type==='date' && (
        <div className="animate-in">
          <input type="date" value={dateVal} onChange={e=>setDateVal(e.target.value)}
            style={{ width:'100%', height:52, padding:'0 18px', border:`2px solid ${dateVal?T.accent:T.border}`, borderRadius:10, fontSize:16, color:T.primary, fontFamily:'Plus Jakarta Sans,sans-serif', outline:'none', marginBottom:20, background:T.white, transition:'border-color 0.15s' }}
            onFocus={e=>e.target.style.borderColor=T.accent} onBlur={e=>{if(!dateVal)e.target.style.borderColor=T.border;}}/>
          <Btn onClick={()=>dateVal&&pickChoice(dateVal)} disabled={!dateVal} full size="lg">Next →</Btn>
        </div>
      )}
      {q.type==='choice' && (
        <div className="animate-in" style={{ display:'flex', flexDirection:'column', gap:10 }}>
          {q.options.map(opt=>(
            <button key={opt.value} onClick={()=>pickChoice(opt.value)}
              style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'16px 18px', border:`2px solid ${answers[q.key]===opt.value?T.accent:T.border}`, borderRadius:10, background:answers[q.key]===opt.value?T.accentSubtle:T.white, cursor:'pointer', fontFamily:'Plus Jakarta Sans,sans-serif', transition:'all 0.15s' }}
              onMouseEnter={e=>{if(answers[q.key]!==opt.value)e.currentTarget.style.borderColor=T.accent;}}
              onMouseLeave={e=>{if(answers[q.key]!==opt.value)e.currentTarget.style.borderColor=T.border;}}>
              <div style={{ textAlign:'left' }}>
                <div style={{ fontSize:15, fontWeight:600, color:T.primary }}>{opt.icon&&<span style={{ marginRight:8 }}>{opt.icon}</span>}{opt.label}</div>
                <div style={{ fontSize:12, color:T.muted, marginTop:2 }}>{opt.sub}</div>
              </div>
              {answers[q.key]===opt.value && <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="9" fill={T.accent}/><path d="M6 10l3 3 5-5" stroke="#fff" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
            </button>
          ))}
        </div>
      )}
    </div>
  );
};

// ─── LANDING PAGE ─────────────────────────────────────────────────────────────
const LandingPage = ({ onQuickMatch, onNeighborhood }) => (
  <div className="animate-in">
    {/* Hero */}
    <div style={{ background:`linear-gradient(160deg,${T.primary} 0%,${T.n800} 55%,${T.n700} 100%)`, padding:'72px 32px 64px', position:'relative', overflow:'hidden' }}>
      {[['-80px','-80px',320,'0.07'],['60%','20%',200,'0.05'],['80%','-40px',140,'0.06']].map(([r,t,s,o],i)=>(
        <div key={i} style={{ position:'absolute', right:r, top:t, width:s, height:s, borderRadius:'50%', background:`rgba(196,113,74,${o})`, pointerEvents:'none' }}/>
      ))}
      <div style={{ maxWidth:700, margin:'0 auto', position:'relative', textAlign:'center' }}>
        <div style={{ display:'inline-flex', alignItems:'center', gap:7, background:'rgba(196,113,74,0.18)', border:'1px solid rgba(196,113,74,0.35)', borderRadius:100, padding:'5px 16px', marginBottom:24 }}>
          <div style={{ width:6, height:6, borderRadius:'50%', background:T.accent, animation:'pulse 2s infinite' }}/>
          <span style={{ fontSize:11, fontWeight:600, color:'#E8A880', letterSpacing:'0.08em' }}>Seoul · 30-day+ stays · Foreigners only</span>
        </div>
        <h1 style={{ fontFamily:'Fraunces,serif', fontSize:'clamp(38px,6vw,58px)', fontWeight:700, color:'#FAF7F2', lineHeight:1.12, marginBottom:18, letterSpacing:'-0.5px' }}>
          Live in Korea<br/><span style={{ color:T.accent }}>like a local.</span>
        </h1>
        <p style={{ fontSize:'clamp(15px,2vw,17px)', color:'#A8917E', marginBottom:36, lineHeight:1.7, maxWidth:520, margin:'0 auto 36px' }}>
          From accommodation to visa, eSIM, bank account — everything you need to live like a local, all in one place.
        </p>

        {/* Primary CTA */}
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:10, marginBottom:28 }}>
          <button onClick={onQuickMatch}
            style={{ height:60, padding:'0 48px', background:T.accent, color:'#fff', border:'none', borderRadius:12, fontSize:18, fontWeight:700, cursor:'pointer', fontFamily:'Plus Jakarta Sans,sans-serif', transition:'all 0.2s', boxShadow:'0 8px 32px rgba(196,113,74,0.4)', letterSpacing:'-0.2px' }}
            onMouseEnter={e=>{e.currentTarget.style.background=T.accentHov;e.currentTarget.style.transform='scale(1.02)';}}
            onMouseLeave={e=>{e.currentTarget.style.background=T.accent;e.currentTarget.style.transform='scale(1)';}}>
            Start Quick Match →
          </button>
          <p style={{ fontSize:13, color:'#8B7355', margin:0 }}>
            Answer 5 quick questions. Get matched with your perfect stay in 24 hours.
          </p>
        </div>

        {/* Trust strip */}
        <div style={{ display:'flex', flexWrap:'wrap', justifyContent:'center', gap:20, marginTop:8 }}>
          {['✓ Licensed long-term rentals only','✓ 24/7 English concierge','✓ No security deposit games'].map(t=>(
            <div key={t} style={{ display:'flex', alignItems:'center', gap:5, fontSize:12, color:'#8B7355', fontWeight:500 }}>
              <span style={{ color:T.accent }}>{t.split(' ')[0]}</span>
              {t.replace('✓ ','')}
            </div>
          ))}
        </div>
      </div>
    </div>

    {/* Neighborhood Map */}
    <NeighborhoodMap onSelect={onNeighborhood}/>

    {/* How it works */}
    <HowItWorks onStart={onQuickMatch}/>

    {/* Pricing */}
    <PricingSection onStart={onQuickMatch}/>

    {/* Footer */}
    <Footer/>
  </div>
);

// ─── APP ROUTER ───────────────────────────────────────────────────────────────
const App = () => {
  const [route, setRoute] = React.useState({ page:'landing' });
  const [scrolled, setScrolled] = React.useState(false);

  React.useEffect(()=>{
    const onScroll = ()=>setScrolled(window.scrollY>10);
    window.addEventListener('scroll', onScroll);
    return ()=>window.removeEventListener('scroll', onScroll);
  },[]);

  const navigate = (page, params={}) => {
    setRoute({ page, ...params });
    window.scrollTo({ top:0, behavior:'smooth' });
  };

  const selectedStay = route.stayId ? STAYS_DATA.find(s=>s.id===route.stayId) : null;

  return (
    <div style={{ minHeight:'100vh', background:T.surface }}>
      <NavBar
        onHome={()=>navigate('landing')}
        onQuickMatch={()=>navigate('quick-match')}
        scrolled={scrolled}
      />

      {route.page==='landing' && (
        <LandingPage
          onQuickMatch={()=>navigate('quick-match')}
          onNeighborhood={id=>navigate('stays',{neighborhoodId:id})}
        />
      )}

      {route.page==='stays' && (
        <StaysPage
          initialNeighborhood={route.neighborhoodId||null}
          onStayClick={stay=>navigate('stay-detail',{stayId:stay.id})}
          onBack={()=>navigate('landing')}
        />
      )}

      {route.page==='stay-detail' && selectedStay && (
        <StayDetailPage
          stay={selectedStay}
          onBack={()=>navigate('stays',{neighborhoodId:selectedStay.neighborhoodId})}
        />
      )}

      {route.page==='quick-match' && (
        <QuickMatch
          onDone={()=>navigate('landing')}
          onBack={()=>navigate('landing')}
        />
      )}
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);

</script>
</body>
</html>
