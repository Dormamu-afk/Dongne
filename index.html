const Btn = ({ children, onClick, disabled, full, size='md', variant='primary', color=T.accent, colorHov=T.accentHov }) => {
  const [hov, setHov] = React.useState(false);
  const h = { lg: 52, md: 44, sm: 36 }[size];
  const fs = { lg: 16, md: 15, sm: 13 }[size];
  const px = { lg: 28, md: 22, sm: 16 }[size];
  const isGhost = variant === 'ghost';
  return (
    <button onClick={onClick} disabled={disabled}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{
        height: h, padding: `0 ${px}px`,
        background: isGhost ? (hov ? T.surface : 'transparent') : disabled ? '#E8E0D5' : hov ? colorHov : color,
        color: isGhost ? T.primary : disabled ? T.disabled : '#fff',
        border: isGhost ? `1.5px solid ${T.border}` : 'none',
        borderRadius: 8, fontSize: fs, fontWeight: 600,
        cursor: disabled ? 'not-allowed' : 'pointer',
        fontFamily: 'Roboto, sans-serif', width: full ? '100%' : 'auto',
        transition: 'all 0.15s', flexShrink: 0,
      }}>
      {children}
    </button>
  );
};

              <div style={{ width: 48, height: 48, borderRadius: '50%', background: T.accent, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18, fontWeight: 700, color: '#fff', flexShrink: 0 }}>K</div>
              <div>
                <div style={{ fontSize: 14, fontWeight: 600, color: T.primary }}>{c.hostLabel}: Kim Jiwon</div>
                <div style={{ fontSize: 12, color: T.muted }}>{c.superhost}</div>
              </div>
            </div>
            <div style={{ height: 1, background: T.border, marginBottom: 22 }} />

            {/* Feature pills */}
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 22 }}>
              {['WiFi 500Mbps', 'A/C', 'Washer', 'Fridge', 'Smart TV', 'Desk', 'Parking', 'Espresso'].map(a => (
                <span key={a} style={{ display: 'inline-flex', alignItems: 'center', gap: 4, height: 30, padding: '0 12px', background: T.surface, border: `1px solid ${T.border}`, borderRadius: 100, fontSize: 12, color: T.muted, fontWeight: 500 }}>{a}</span>
              ))}
            </div>
            <div style={{ height: 1, background: T.border, marginBottom: 22 }} />

            {/* Reviews */}
            <h3 style={{ fontSize: 16, fontWeight: 700, color: T.primary, marginBottom: 16 }}>{c.reviewsTitle}</h3>
            {[
              { name: 'Jake M.', flag: '🇺🇸', text: 'The host speaks great English and helped me set up a bank account. Perfect for long stays!', date: 'Nov 2025' },
              { name: 'Sophie L.', flag: '🇦🇺', text: 'Loved Yeonnam. The concierge sorted my ARC in 2 days. Highly recommend for first-timers.', date: 'Oct 2025' },
              { name: 'Carlos R.', flag: '🇲🇽', text: 'Great location, super clean, host responded in minutes. Would stay again for sure.', date: 'Sep 2025' },
            ].map((r, i) => (
              <div key={i} style={{ padding: '14px 0', borderBottom: i < 2 ? `1px solid ${T.border}` : 'none' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 7 }}>
                  <span style={{ fontSize: 18 }}>{r.flag}</span>
                  <span style={{ fontSize: 13, fontWeight: 600, color: T.primary }}>{r.name}</span>
                  <span style={{ fontSize: 11, color: T.muted, marginLeft: 2 }}>{r.date}</span>
                  <div style={{ display: 'flex', gap: 2, marginLeft: 'auto' }}>
                    {[1,2,3,4,5].map(s => <StarIcon key={s} size={11} />)}
                  </div>
                </div>
                <p style={{ fontSize: 13, color: T.muted, lineHeight: 1.65 }}>{r.text}</p>
              </div>
            ))}
          </div>

          {/* Right — Booking widget */}
          <div style={{ position: 'sticky', top: 120 }}>
            <div style={{ background: T.white, border: `1px solid ${T.border}`, borderRadius: 14, padding: '24px', boxShadow: '0 4px 24px rgba(44,36,32,0.08)' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 20 }}>
                <div>
                  <span style={{ fontSize: 28, fontWeight: 800, color: T.primary }}>${price}</span>
                  <span style={{ fontSize: 13, color: T.muted }}> / {PERIODS_USD.find(p => p.key === period)?.label}</span>
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                  <StarIcon size={13} /><span style={{ fontSize: 13, fontWeight: 600, color: T.primary }}>{l.rating}</span>
                </div>
              </div>

              {/* Period selector */}
              <div style={{ marginBottom: 16 }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: T.muted, textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 8 }}>{c.stayLength}</div>
                <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap' }}>
                  {PERIODS_USD.map(p => (
                    <button key={p.key} onClick={() => setPeriod(p.key)}
                      style={{ flex: '1 1 auto', minWidth: 44, height: 36, borderRadius: 7, border: `1.5px solid ${period === p.key ? T.accent : T.border}`, background: period === p.key ? T.accentSubtle : T.white, color: period === p.key ? T.accent : T.muted, fontSize: 11, fontWeight: 600, cursor: 'pointer', fontFamily: 'Roboto, sans-serif', transition: 'all 0.15s' }}>
                      {p.key}
                    </button>
                  ))}
                </div>
              </div>

              {/* Move-in date */}
              <div style={{ marginBottom: 16 }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: T.muted, textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 8 }}>{c.moveInDate}</div>
                <input type="date" value={moveIn} onChange={e => setMoveIn(e.target.value)}
                  style={{ width: '100%', height: 44, padding: '0 14px', border: `1.5px solid ${T.border}`, borderRadius: 8, fontSize: 14, color: T.primary, fontFamily: 'Roboto, sans-serif', outline: 'none', background: T.white, transition: 'border-color 0.15s' }}
                  onFocus={e => e.target.style.borderColor = T.accent}
                  onBlur={e => e.target.style.borderColor = T.border}
                />
              </div>

              <Btn onClick={onNext} full size="lg">{c.reserveBtn}</Btn>
              <p style={{ fontSize: 11, color: T.muted, textAlign: 'center', marginTop: 8, lineHeight: 1.5 }}>{c.reserveNote}</p>

              <div style={{ borderTop: `1px solid ${T.border}`, marginTop: 18, paddingTop: 18 }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: T.primary, marginBottom: 6 }}>{c.quickMatchWidget}</div>
                <p style={{ fontSize: 12, color: T.muted, marginBottom: 10, lineHeight: 1.5 }}>{c.quickMatchWidgetSub}</p>
                <button onClick={onNext}
                  style={{ width: '100%', height: 38, background: T.accentSubtle, color: T.accent, border: `1px solid ${T.accentLight}`, borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: 'pointer', fontFamily: 'Roboto, sans-serif', transition: 'background 0.15s' }}
                  onMouseEnter={e => e.currentTarget.style.background = T.accentLight}
                  onMouseLeave={e => e.currentTarget.style.background = T.accentSubtle}>
                  {c.quickMatchWidgetBtn}
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

// ════════════════════════════════════════════════════════════════════════════
// SCREEN 4 — Quick Match Wizard
// ════════════════════════════════════════════════════════════════════════════
const Screen4_QuickMatch = ({ c, onNext, onBack }) => {
  const [qStep, setQStep] = React.useState(0);
  const [answers, setAnswers] = React.useState({});
  const [dateVal, setDateVal] = React.useState('');

  const QUESTIONS = [
    { key: 'arrival',  title: c.qmQ1, type: 'date' },
    { key: 'duration', title: c.qmQ2, type: 'choice', options: c.qmDurations },
    { key: 'visa',     title: c.qmQ3, type: 'choice', options: c.qmVisas },
    { key: 'budget',   title: c.qmQ4, type: 'choice', options: c.qmBudgets },
    { key: 'vibe',     title: c.qmQ5, type: 'choice', options: c.qmVibes },
  ];

  const q = QUESTIONS[qStep];
  const currentAns = answers[q.key];

  const pickChoice = (v) => {
    const newAns = { ...answers, [q.key]: v };
    setAnswers(newAns);
    if (qStep < QUESTIONS.length - 1) setTimeout(() => setQStep(qStep + 1), 220);
    else setTimeout(() => onNext(), 350);
  };

  const goBack = () => {
    if (qStep === 0) onBack();
    else setQStep(qStep - 1);
  };

  return (
    <div style={{ maxWidth: 640, margin: '0 auto', padding: '40px 24px 60px' }}>
      <button onClick={goBack} style={{ display: 'flex', alignItems: 'center', gap: 6, background: 'none', border: 'none', color: T.muted, fontSize: 13, cursor: 'pointer', marginBottom: 28, fontFamily: 'Roboto, sans-serif' }}>
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M12.5 15L7.5 10L12.5 5" stroke={T.muted} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
        {qStep === 0 ? c.qmBackFirst : c.qmBack}
      </button>

      <ProgressBar step={qStep + 1} total={QUESTIONS.length} />

      {/* Question */}
      <div className="animate-in" key={qStep} style={{ marginBottom: 28 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14 }}>
          <div style={{ width: 32, height: 32, borderRadius: '50%', background: T.accentSubtle, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: T.accent }}>{qStep + 1}</span>
          </div>
          <span style={{ fontSize: 11, fontWeight: 600, color: T.muted, letterSpacing: '0.06em', textTransform: 'uppercase' }}>{c.qmTitle} · {qStep + 1} / {QUESTIONS.length}</span>
        </div>
        <h2 style={{ fontSize: 26, fontWeight: 700, color: T.primary, lineHeight: 1.3 }}>{q.title}</h2>
      </div>

      {/* Date picker */}
      {q.type === 'date' && (
        <div className="animate-in">
          <input type="date" value={dateVal} onChange={e => setDateVal(e.target.value)}
            style={{ width: '100%', height: 52, padding: '0 18px', border: `2px solid ${dateVal ? T.accent : T.border}`, borderRadius: 10, fontSize: 16, color: T.primary, fontFamily: 'Roboto, sans-serif', outline: 'none', marginBottom: 20, background: T.white, transition: 'border-color 0.15s' }}
            onFocus={e => e.target.style.borderColor = T.accent}
            onBlur={e => e.target.style.borderColor = dateVal ? T.accent : T.border}
          />
          <Btn onClick={() => { if (dateVal) { setAnswers({ ...answers, arrival: dateVal }); setQStep(1); }}} full size="lg" disabled={!dateVal}>{c.qmNext}</Btn>
        </div>
      )}

      {/* Choice grid */}
      {q.type === 'choice' && (
        <div className="animate-in" style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 12 }}>
          {q.options.map((o, i) => (
            <div key={o.value} onClick={() => pickChoice(o.value)}
              className="animate-in" style={{ animationDelay: `${i * 0.05}s` }}
              onMouseEnter={e => { if (currentAns !== o.value) e.currentTarget.style.borderColor = T.accent; }}
              onMouseLeave={e => { if (currentAns !== o.value) e.currentTarget.style.borderColor = T.border; }}
              style={{ background: currentAns === o.value ? T.accentSubtle : T.white, border: `2px solid ${currentAns === o.value ? T.accent : T.border}`, borderRadius: 10, padding: '18px', cursor: 'pointer', transition: 'all 0.15s', position: 'relative' }}>
              {o.icon && <div style={{ fontSize: 26, marginBottom: 8 }}>{o.icon}</div>}
              <div style={{ fontSize: 15, fontWeight: 700, color: T.primary, marginBottom: 4 }}>{o.label}</div>
              <div style={{ fontSize: 12, color: T.muted, lineHeight: 1.4 }}>{o.sub}</div>
              {currentAns === o.value && (
                <div style={{ position: 'absolute', top: 10, right: 10, width: 20, height: 20, borderRadius: '50%', background: T.accent, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </div>
              )}
            </div>
          ))}
        </div>
      )}

      {/* Answered summary */}
      {Object.keys(answers).length > 0 && (
        <div style={{ marginTop: 32, padding: '14px 16px', background: T.surface, border: `1px solid ${T.border}`, borderRadius: 10, display: 'flex', flexWrap: 'wrap', gap: 8 }}>
          {QUESTIONS.slice(0, qStep).map((q, i) => answers[q.key] && (
            <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 5, height: 26, padding: '0 10px', background: T.white, border: `1px solid ${T.border}`, borderRadius: 100, fontSize: 11, color: T.muted }}>
              <span style={{ color: T.success, fontWeight: 700 }}>✓</span>
              <span>{q.type === 'date' ? answers[q.key] : q.options?.find(o => o.value === answers[q.key])?.label}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

// ════════════════════════════════════════════════════════════════════════════
// SCREEN 5 — Concierge Call Booking
// ════════════════════════════════════════════════════════════════════════════
const Screen5_Concierge = ({ c, onBack }) => {
  const [selectedSlot, setSelectedSlot] = React.useState(null);
  const [name, setName] = React.useState('');
  const [email, setEmail] = React.useState('');
  const [submitted, setSubmitted] = React.useState(false);

  const SLOTS = [
    { id: 1, day: c.today,    time: '3:00 PM', avail: true },
    { id: 2, day: c.today,    time: '5:00 PM', avail: true },
    { id: 3, day: c.tomorrow, time: '10:00 AM', avail: true },
    { id: 4, day: c.tomorrow, time: '2:00 PM',  avail: false },
    { id: 5, day: c.tomorrow, time: '4:00 PM',  avail: true },
    { id: 6, day: c.dayAfter, time: '11:00 AM', avail: true },
    { id: 7, day: c.dayAfter, time: '1:00 PM',  avail: true },
    { id: 8, day: c.dayAfter, time: '3:00 PM',  avail: false },
  ];
  const canSubmit = selectedSlot && name.trim() && email.trim() && email.includes('@');

  const handleSubmit = () => {
    if (!canSubmit) return;
    setSubmitted(true);
  };

  if (submitted) {
    return (
      <div className="animate-in" style={{ maxWidth: 540, margin: '80px auto', padding: '0 24px', textAlign: 'center' }}>
        <div style={{ width: 80, height: 80, borderRadius: '50%', background: T.successBg, border: `2px solid ${T.success}30`, display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 22px', fontSize: 36 }}>✓</div>
        <Badge color={T.success} bg={T.successBg}>Confirmed!</Badge>
        <h2 style={{ fontSize: 26, fontWeight: 700, color: T.primary, margin: '14px 0 10px' }}>{c.successTitle}</h2>
        <p style={{ fontSize: 14, color: T.muted, lineHeight: 1.7, marginBottom: 28, whiteSpace: 'pre-line' }}>{c.successSub}</p>
        <div style={{ background: T.white, border: `1px solid ${T.border}`, borderRadius: 12, padding: '20px', textAlign: 'left', marginBottom: 28 }}>
          {[
            ['Booking ref', '#DNG-2026-' + Math.floor(1000 + Math.random() * 8999)],
            ['Time', `${SLOTS.find(s => s.id === selectedSlot)?.day}, ${SLOTS.find(s => s.id === selectedSlot)?.time}`],
            ['Duration', '15 minutes'],
            ['Format', 'Google Meet (link sent to email)'],
          ].map(([k, v]) => (
            <div key={k} style={{ display: 'flex', justifyContent: 'space-between', padding: '9px 0', borderBottom: k !== 'Format' ? `1px solid ${T.border}` : 'none', fontSize: 13 }}>
              <span style={{ color: T.muted }}>{k}</span>
              <span style={{ color: T.primary, fontWeight: 500 }}>{v}</span>
            </div>
          ))}
        </div>
        <Btn onClick={onBack} full size="lg" variant="ghost">Back to listings</Btn>
      </div>
    );
  }

  return (
    <div className="animate-in" style={{ maxWidth: 820, margin: '0 auto', padding: '40px 24px 60px' }}>
      <button onClick={onBack} style={{ display: 'flex', alignItems: 'center', gap: 6, background: 'none', border: 'none', color: T.muted, fontSize: 13, cursor: 'pointer', marginBottom: 28, fontFamily: 'Roboto, sans-serif' }}>
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M12.5 15L7.5 10L12.5 5" stroke={T.muted} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
        Back
      </button>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 300px', gap: 36, alignItems: 'start' }}>
        {/* Main form */}
        <div>
          <Badge color={T.accent} bg={T.accentSubtle}>Last step</Badge>
          <h2 style={{ fontSize: 26, fontWeight: 700, color: T.primary, marginTop: 10, marginBottom: 6 }}>{c.conciergeTitle}</h2>
          <p style={{ fontSize: 14, color: T.muted, marginBottom: 28, lineHeight: 1.65 }}>{c.conciergeSub}</p>

          {/* Time slots */}
          <div style={{ marginBottom: 26 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: T.primary, marginBottom: 12 }}>{c.selectTime}</div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 8 }}>
              {SLOTS.map(s => (
                <button key={s.id} onClick={() => s.avail && setSelectedSlot(s.id)} disabled={!s.avail}
                  style={{ padding: '10px 8px', borderRadius: 8, border: `2px solid ${selectedSlot === s.id ? T.accent : T.border}`, background: !s.avail ? T.surface : selectedSlot === s.id ? T.accentSubtle : T.white, cursor: s.avail ? 'pointer' : 'not-allowed', fontFamily: 'Roboto, sans-serif', opacity: s.avail ? 1 : 0.45, transition: 'all 0.15s' }}
                  onMouseEnter={e => { if (s.avail && selectedSlot !== s.id) e.currentTarget.style.borderColor = T.accent; }}
                  onMouseLeave={e => { if (selectedSlot !== s.id) e.currentTarget.style.borderColor = T.border; }}>
                  <div style={{ fontSize: 10, color: T.muted, marginBottom: 3, fontWeight: 500 }}>{s.day}</div>
                  <div style={{ fontSize: 13, fontWeight: 700, color: selectedSlot === s.id ? T.accent : T.primary }}>{s.time}</div>
                  {!s.avail && <div style={{ fontSize: 9, color: T.disabled, marginTop: 2 }}>{c.unavailable}</div>}
                </button>
              ))}
            </div>
          </div>

          <FormInput label={c.yourName} placeholder={c.yourNameP} value={name} onChange={e => setName(e.target.value)} />
          <FormInput label={c.yourEmail} type="email" placeholder={c.yourEmailP} value={email} onChange={e => setEmail(e.target.value)} hint={c.emailHint} />

          <Btn onClick={handleSubmit} full size="lg" disabled={!canSubmit}>
            {canSubmit ? c.confirmBtn : c.confirmDisabled}
          </Btn>
        </div>

        {/* Side info */}
        <div style={{ background: T.white, border: `1px solid ${T.border}`, borderRadius: 12, padding: '22px', position: 'sticky', top: 120 }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: T.primary, marginBottom: 16 }}>{c.whatWeHelp}</div>
          {c.callHelp.map(item => (
            <div key={item.title} style={{ display: 'flex', gap: 11, marginBottom: 16 }}>
              <span style={{ fontSize: 20, flexShrink: 0, lineHeight: 1.3 }}>{item.icon}</span>
              <div>
                <div style={{ fontSize: 13, fontWeight: 600, color: T.primary, marginBottom: 3 }}>{item.title}</div>
                <div style={{ fontSize: 12, color: T.muted, lineHeight: 1.55 }}>{item.desc}</div>
              </div>
            </div>
          ))}
          <div style={{ marginTop: 6, padding: '12px 14px', background: T.accentSubtle, borderRadius: 8, border: `1px solid ${T.accentLight}` }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: T.accent, marginBottom: 3 }}>{c.itsFree}</div>
            <div style={{ fontSize: 11, color: T.muted, lineHeight: 1.5 }}>{c.itsFreeNote}</div>
          </div>
        </div>
      </div>
    </div>
  );
};

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
const App = () => {
  const [lang, setLang] = React.useState('en');
  const [screen, setScreen] = React.useState(0);
  const [selectedListing, setSelectedListing] = React.useState(LISTINGS[0]);
  const [scrolled, setScrolled] = React.useState(false);

  React.useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 10);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const c = COPY[lang];

  const STEP_LABELS = {
    en: ['Listings', 'Neighborhoods', 'Listing Detail', 'Quick Match', 'Concierge Call'],
    zh: ['房源', '街区探索', '房源详情', '快速匹配', '礼宾电话'],
    ja: ['物件一覧', 'エリア探索', '物件詳細', 'クイックマッチ', 'コンシェルジュ'],
    es: ['Alojamientos', 'Barrios', 'Detalle', 'Matcheo Rápido', 'Conserje'],
    de: ['Unterkünfte', 'Viertel', 'Details', 'Quick Match', 'Concierge'],
  };

  const steps = STEP_LABELS[lang] || STEP_LABELS.en;

  const nav = (s) => {
    setScreen(s);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  return (
    <div style={{ minHeight: '100vh', background: T.surface }}>
      <NavBar lang={lang} setLang={setLang} c={c} onQuickMatch={() => nav(3)} scrolled={scrolled} />
      {screen > 0 && <StepBar step={screen - 1} steps={steps} onStep={i => nav(i + 1)} />}

      {screen === 0 && (
        <Screen1_Landing c={c}
          onNext={() => nav(1)}
          onDetail={(l) => { setSelectedListing(l); nav(2); }}
        />
      )}
      {screen === 1 && (
        <Screen2_Neighborhoods c={c}
          onNext={() => nav(2)}
          onBack={() => nav(0)}
        />
      )}
      {screen === 2 && (
        <Screen3_Detail c={c} listing={selectedListing}
          onNext={() => nav(3)}
          onBack={() => nav(1)}
        />
      )}
      {screen === 3 && (
        <Screen4_QuickMatch c={c}
          onNext={() => nav(4)}
          onBack={() => nav(2)}
        />
      )}
      {screen === 4 && (
        <Screen5_Concierge c={c}
          onBack={() => nav(3)}
        />
      )}
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
